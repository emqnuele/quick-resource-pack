name: minecraft 1.21.x compatibility

on:
  pull_request:
    paths:
      - src/**
      - build.gradle
      - gradle.properties
      - gw21
      - scripts/with-java.sh
      - scripts/check-compat-1.21.sh
      - .github/workflows/compat-1-21.yml
  push:
    branches:
      - main
      - master
    paths:
      - src/**
      - build.gradle
      - gradle.properties
      - gw21
      - scripts/with-java.sh
      - scripts/check-compat-1.21.sh
      - .github/workflows/compat-1-21.yml
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: ensure script permissions
        run: chmod +x gradlew gw21 scripts/with-java.sh scripts/check-compat-1.21.sh

      - name: run representative 1.21.x smoke matrix
        run: ./scripts/check-compat-1.21.sh 1.21.1 1.21.4 1.21.8 1.21.11

  full:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: ensure script permissions
        run: chmod +x gradlew gw21 scripts/with-java.sh scripts/check-compat-1.21.sh

      - name: run full 1.21.x compatibility matrix
        run: ./scripts/check-compat-1.21.sh
